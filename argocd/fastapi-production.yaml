apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-production
  namespace: argocd
  labels:
    environment: production
    team: platform
spec:
  project: default
  source:
    repoURL: https://github.com/Jeremieon/k3s-lab.git
    targetRevision: main      
    path: fastapi-chart
    helm:
      valueFiles:
        - ../helm-values/values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
