apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Jeremieon/k3s-lab.git
    targetRevision: main
    path: argocd
    directory:
      exclude: app-of-apps.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
