apiVersion: apps/v1
kind: Deployment
metadata:
  name: items-service
  namespace: production
  labels:
    app: items-service
    environment: production
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: items-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: items-service
        environment: production
        version: "1.0.0"
    spec:
      containers:
      - name: items-service
        image: jeremy9k/items-service:1.0.0
        ports:
        - containerPort: 80
        env:
        - name: APP_VERSION
          valueFrom: 
            configMapKeyRef:
              name: items-service-config
              key : APP_VERSION
        - name: ENVIRONMENT
          valueFrom: 
            configMapKeyRef:
              name: items-service-config
              key : ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom: 
            configMapKeyRef:
              name: items-service-config
              key : LOG_LEVEL
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name : items-service-secret
              key : DB_USERNAME
        - name : API_KEY
          valueFrom:
            secretKeyRef:
              name: items-service-secret
              key: API_KEY
        # Mount the entire ConfigMap as environment variables at once
        # Cleaner when you want ALL keys from a ConfigMap
          envFrom:
          - configMapRef:
              name: items-service-config
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 2