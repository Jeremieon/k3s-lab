apiVersion: v1
kind: ConfigMap
metadata:
  name: items-service-config
  namespace: production
  labels:
    app: items-service
    environment: production
data:
  # Simple key/value pairs — consumed as environment variables
  APP_VERSION: "1.0.0"
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  MAX_ITEMS_PER_PAGE: "50"
  # A multi-line value — consumed as a mounted file
  app-config.json: |
    {
      "service_name": "items-service",
      "version": "1.0.0",
      "features": {
        "filtering_enabled": true,
        "max_results": 50
      }
    }
