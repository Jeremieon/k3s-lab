apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-service-config
  namespace: production
  labels:
    app: gateway-service
    environment: production
data:
  APP_VERSION: "1.0.0"
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  # This is the key one — service URL lives in config, not in the Deployment
  ITEMS_SERVICE_URL: "http://items-service.production.svc.cluster.local"
  TIMEOUT_SECONDS: "5"
