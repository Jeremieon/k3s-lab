apiVersion: v1
kind: Pod
metadata:
  name: my-first-pod
  namespace: default
  labels:
    app: learning
    phase: "1"
spec:
  containers:
  - name : nginx
    image: nginx:alpine
    ports:
    - containerPort: 80
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "64Mi"
        cpu: "100m"
