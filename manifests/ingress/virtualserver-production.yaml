apiVersion: k8s.nginx.org/v1
kind: VirtualServer
metadata:
  name: fastapi-vs
  namespace: production
spec:
  host: fastapi.lab.local
  ingressClassName: nginx

  tls:
    secret: fastapi-lab-tls
    redirect:
      enable: true
      code: 301

  # Policies applied at VirtualServer level affect ALL routes
  policies:
  - name: rate-limit-standard

  upstreams:
  - name: gateway
    service: gateway-service
    port: 80
    healthCheck:
      enable: true
      path: /health
      interval: 5s
      fails: 3
      passes: 2

  - name: items
    service: items-service
    port: 80
    healthCheck:
      enable: true
      path: /health
      interval: 5s
      fails: 3
      passes: 2

  routes:
  - path: /
    action:
      pass: gateway

  - path: /catalog
    action:
      pass: gateway

  # Stricter limit on /items — this is your "API" endpoint
  - path: /items
    policies:
    - name: rate-limit-strict   # overrides the VS-level policy for this route
    action:
      pass: items

  - path: /health
    action:
      pass: gateway
