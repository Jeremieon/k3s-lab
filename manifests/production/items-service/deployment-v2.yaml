apiVersion: apps/v1
kind: Deployment
metadata:
  name: items-service-v2
  namespace: production
  labels:
    app: items-service-v2
    environment: production
    version: "2.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: items-service-v2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: items-service-v2
        environment: production
        version: "2.0.0"
    spec:
      containers:
      - name: items-service
        image: jeremy9k/items-service:2.0.0
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: items-service-config
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
