apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: production
  labels:
    app: gateway-service
    environment: production
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gateway-service
        environment: production
        version: "1.0.0"
    spec:
      containers:
      - name: gateway-service
        image: jeremy9k/gateway-service:1.0.0
        ports:
        - containerPort: 80
        env:
        - name: APP_VERSION
          value: "1.0.0"
        - name: ENVIRONMENT
          value: "production"
        - name: ITEMS_SERVICE_URL
          value: "http://items-service.production.svc.cluster.local"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
