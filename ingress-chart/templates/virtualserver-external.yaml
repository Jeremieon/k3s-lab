{{- if .Values.externalVirtualServers.fastapi.enabled }}
---
apiVersion: k8s.nginx.org/v1
kind: VirtualServer
metadata:
  name: {{ .Values.externalVirtualServers.fastapi.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  host: {{ .Values.externalVirtualServers.fastapi.host }}
  ingressClassName: {{ .Values.global.ingressClasses.external }}
  tls:
    secret: {{ .Values.externalVirtualServers.fastapi.tlsSecret }}
    redirect:
      enable: true
      code: 301
  policies:
  {{- range .Values.externalVirtualServers.fastapi.policies }}
  - name: {{ . }}
  {{- end }}
  upstreams: []
  routes:
  {{- range .Values.externalVirtualServers.fastapi.routes }}
  - path: {{ .path }}
    route: {{ .route }}
  {{- end }}
{{- end }}
