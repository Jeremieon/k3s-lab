# ============================================================
# Global values — apply to all services
# ============================================================
global:
  environment: production
  registry: docker.io

# ============================================================
# items-service configuration
# ============================================================
itemsService:
  enabled: true
  name: items-service

  image:
    repository: jeremy9k/items-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

  config:
    APP_VERSION: "1.0.0"
    LOG_LEVEL: "info"
    MAX_ITEMS_PER_PAGE: "50"

  probes:
    liveness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 5

  service:
    type: ClusterIP
    port: 80

# ============================================================
# gateway-service configuration
# ============================================================
gatewayService:
  enabled: true
  name: gateway-service

  image:
    repository: jeremy9k/gateway-service
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

  config:
    APP_VERSION: "1.0.0"
    LOG_LEVEL: "info"
    TIMEOUT_SECONDS: "5"

  probes:
    liveness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 5

  service:
    type: ClusterIP
    port: 80
