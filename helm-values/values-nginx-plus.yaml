controller:
  nginxplus: true

  image:
    repository: private-registry.nginx.com/nginx-ic/nginx-plus-ingress
    tag: "5.3.4"
    pullPolicy: IfNotPresent

  serviceAccount:
    imagePullSecretName: regcred

  mgmt:
    licenseTokenSecretName: nplus-license

  replicaCount: 2

  nginxStatus:
    enable: true
    port: 8080
    allowCidrs: "0.0.0.0/0"

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  service:
    type: LoadBalancer
    externalTrafficPolicy: Local

  ingressClass:
    name: nginx
    create: true
    setAsDefaultIngress: true

  # ============================================================
  # Global NGINX tuning
  # ============================================================
  config:
    entries:
      # Connection tuning
      worker-connections: "4096"
      keepalive-timeout: "75s"

      # Upstream keepalive pool
      # Keeps connections open to your FastAPI pods
      # Avoids TCP handshake overhead on every request
      upstream-keepalive-connections: "64"
      upstream-keepalive-time: "1h"

      # Upstream timeouts
      # 10s connect — if pod doesn't accept connection in 10s it's down
      # 30s read — FastAPI has 30s to return a response
      proxy-connect-timeout: "10s"
      proxy-read-timeout: "30s"
      proxy-send-timeout: "30s"

      # Security — don't advertise NGINX version
      server-tokens: "off"

      # TLS — only modern protocols
      ssl-protocols: "TLSv1.2 TLSv1.3"

      # Structured JSON access logs — ready for Loki in Phase 4
      log-format: '{"time":"$time_iso8601","remote_addr":"$remote_addr","method":"$request_method","uri":"$request_uri","status":"$status","bytes_sent":"$bytes_sent","request_time":"$request_time","upstream_addr":"$upstream_addr","upstream_response_time":"$upstream_response_time","host":"$host"}'
